<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heather Ricarte-Portfolio</title>

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    
    <link rel="stylesheet" href="css/normalize.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elsie+Swash+Caps&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
    
<body>
    <header class="page-header">
        <div class="brand">
            <img src="images/HR_logo.png" class="logo" alt="Heather Ricarte Logo">
            <span class="brand-heading">Heather Ricarte</span>
        </div>          
        <nav class="navigation">
            <ul class="navigation-list">
                <li>
                    <a href="index.html" class="navigation-list__item">Home</a>
                </li>
                <li>
                    <a href="about.html" class="navigation-list__item">About</a>
                </li>
                <li>
                    <a href="contact.html" class="navigation-list__item navigation-list__item--active" aria-current="page">Contact</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Let's Connect! 👋🏼</h1>
        <div class="contact-wrapper"> 
        <div id="personal" class="contact-info">
            <p><span class="label-text">Hometown: </span>Seattle, WA</p>
            <p><span class="label-text">Mobile: </span><a href="tel:1-206-605-7443">1-206-605-7443</a></p>
            <p><span class="label-text">Email: </span><a href="mailto:ricarte.heather@gmail.com">ricarte.heather@gmail.com</a></p>
        </div>

        <div id="form-container" class="contact-form-section">
            <form method="post" id="contact-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="contact-fname" class="standard-label">First name</label>
                        <input type="text" id="contact-fname" name="fname" required autofocus>
                        <span id="name-helper" class="helper-text">Required</span>
                    </div>
                    <div class="form-group">
                        <label for="contact-lname" class="standard-label">Last name</label>
                        <input type="text" id="contact-lname" name="lname" required>
                        <span id="name-helper" class="helper-text">Required</span>
                    </div>
                </div>  
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="contact-email" class="standard-label">Email</label>
                        <input type="email" id="contact-email" name="email" placeholder="name@example.com" required>
                        <span id="email-helper" class="helper-text">Required</span>
                    </div>
                    <div class="form-group">
                        <label for="contact-tel" class="standard-label">Telephone</label>
                        <input type="tel" id="contact-tel" name="tel"
                            placeholder="206-555-0123"
                            pattern="\d{3}[\-]\d{3}[\-]\d{4}"
                            maxlength="12"
                            aria-describedby="tel-helper">
                        <span id="tel-helper" class="helper-text">Ex: 123-456-7890</span>
                    </div>
                </div>  
                <div class="form-row">
                    <div class="form-group">
                        <label for="contact-message" class="standard-label">Message</label>
                        <textarea type="text" id="contact-message" name="message" placeholder="Tell me about your project..." maxlength="300" required></textarea>
                        <span id="message-helper" class="helper-text">Required, max 300 characters</span>
                    </div>
                </div>            
                <br />
                <br />
                <button type="submit" class="btn-submit btn-primary">Send</button>
                <button type="reset" class="btn-reset btn">Reset</button>
            </form>
        </div>
    </div>
    </main>

    <footer class="page-footer">
        <h3 class="footer-heading">Find me on</h3>
        <div class="social-media">
            <a href="https://github.com/HeatherR206/" target="_blank" aria-label="GitHub">
                <img src="images/github-logo.png" width="42" height="42" alt="GitHub">
            </a>
            <a href="https://www.linkedin.com/in/heather-ricarte" target="_blank" aria-label="Linkedin">
                <img src="images/linkedin-logo.png" width="42" height="42" alt="Linkedin">
            </a>
        </div>
    </footer>

    <script src="js/tota11y.min.js"></script>
</body>

</html>
